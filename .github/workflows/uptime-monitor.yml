name: Uptime Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  uptime-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check backend health
        id: backend_health
        run: |
          set +e
          code=$(curl -s -o /tmp/backend_health.txt -w "%{http_code}" "$BACKEND_HEALTHCHECK_URL")
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" != "200" ]; then
            echo "Backend health failed with HTTP $code"
            cat /tmp/backend_health.txt
            exit 1
          fi
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}

      - name: Check backend readiness
        id: backend_ready
        run: |
          set +e
          code=$(curl -s -o /tmp/backend_ready.txt -w "%{http_code}" "$BACKEND_READINESS_URL")
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" != "200" ]; then
            echo "Backend readiness failed with HTTP $code"
            cat /tmp/backend_ready.txt
            exit 1
          fi
        env:
          BACKEND_READINESS_URL: ${{ secrets.BACKEND_READINESS_URL }}

      - name: Check student app
        id: student
        run: |
          set +e
          code=$(curl -s -o /tmp/student.txt -w "%{http_code}" "$STUDENT_APP_URL")
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" != "200" ]; then
            echo "Student app failed with HTTP $code"
            cat /tmp/student.txt
            exit 1
          fi
        env:
          STUDENT_APP_URL: ${{ secrets.STUDENT_APP_URL }}

      - name: Check staff app
        id: staff
        run: |
          set +e
          code=$(curl -s -o /tmp/staff.txt -w "%{http_code}" "$STAFF_APP_URL")
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" != "200" ]; then
            echo "Staff app failed with HTTP $code"
            cat /tmp/staff.txt
            exit 1
          fi
        env:
          STAFF_APP_URL: ${{ secrets.STAFF_APP_URL }}

      - name: Notify webhook on failure
        if: failure() && secrets.ALERT_WEBHOOK_URL != ''
        run: |
          payload='{"text":"AFDA uptime monitor detected a failure. Check GitHub Actions run for details."}'
          curl -s -X POST -H "Content-Type: application/json" -d "$payload" "$ALERT_WEBHOOK_URL"
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
