name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Lint and type-check backend
  backend-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: cd backend && npm install
      - name: Lint backend
        run: cd backend && npm run lint
      - name: Type check
        run: cd backend && npm run build

  # Lint and type-check Student Public App
  student-app-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
      - name: Install dependencies
        run: cd apps/student-public && npm install
      - name: Type check
        run: cd apps/student-public && npm run type-check
      - name: Build
        run: cd apps/student-public && npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001

  # Lint and type-check Slot Booking App
  staff-app-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
      - name: Install dependencies
        run: cd apps/slot-booking && npm install
      - name: Type check
        run: cd apps/slot-booking && npm run type-check
      - name: Build
        run: cd apps/slot-booking && npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001

  # Deploy backend to Vercel (only on main branch)
  deploy-backend:
    needs: [backend-lint, student-app-lint, staff-app-lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: vercel/action@v27
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
          working-directory: ./

  # Deploy Student Public App to Vercel (only on main branch)
  deploy-student:
    needs: [backend-lint, student-app-lint, staff-app-lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: vercel/action@v27
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_STUDENT }}
          working-directory: ./apps/student-public
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.PRODUCTION_BACKEND_URL }}

  # Deploy Slot Booking App to Vercel (only on main branch)
  deploy-staff:
    needs: [backend-lint, student-app-lint, staff-app-lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: vercel/action@v27
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_STAFF }}
          working-directory: ./apps/slot-booking
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.PRODUCTION_BACKEND_URL }}

  # Test health and ready endpoints
  test-endpoints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test health endpoint
        run: curl -i https://afda-api.vercel.app/api/health
      - name: Test ready endpoint
        run: curl -i https://afda-api.vercel.app/api/ready
